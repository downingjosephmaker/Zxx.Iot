<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- 文本卡片组件图标 - 30x30px -->
<svg
   xmlns="http://www.w3.org/2000/svg"
   width="30"
   height="30"
   viewBox="0 0 30 30"
   version="1.1">
  <defs>
    <!-- 卡片阴影 -->
    <filter id="card-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.8"/>
      <feOffset dx="0.5" dy="0.5" result="offsetblur"/>
      <feFlood flood-color="rgba(0,0,0,0.3)"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 卡片外框 (带圆角和阴影) -->
  <rect
     x="4"
     y="5"
     width="22"
     height="20"
     rx="2"
     ry="2"
     fill="#ffffff"
     stroke="#666666"
     stroke-width="1.2"
     filter="url(#card-shadow)" />

  <!-- 标题线 (粗线,表示标题) -->
  <line
     x1="7"
     y1="9"
     x2="16"
     y2="9"
     stroke="#333333"
     stroke-width="1.5"
     stroke-linecap="round" />

  <!-- 正文线 1 -->
  <line
     x1="7"
     y1="13"
     x2="23"
     y2="13"
     stroke="#999999"
     stroke-width="0.8"
     stroke-linecap="round" />

  <!-- 正文线 2 -->
  <line
     x1="7"
     y1="16"
     x2="21"
     y2="16"
     stroke="#999999"
     stroke-width="0.8"
     stroke-linecap="round" />

  <!-- 正文线 3 -->
  <line
     x1="7"
     y1="19"
     x2="19"
     y2="19"
     stroke="#999999"
     stroke-width="0.8"
     stroke-linecap="round" />

  <!-- 正文线 4 -->
  <line
     x1="7"
     y1="22"
     x2="22"
     y2="22"
     stroke="#999999"
     stroke-width="0.8"
     stroke-linecap="round" />
</svg>
